<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="css/bootstrap-icons.css">
  <link rel="stylesheet" href="css/daterangepicker.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/custom.css?v=6">

  <title>IQA - Sign In</title>
</head>

<body class="login-page-body">

  <!-- Preloader start -->
  <div class="preloader">
    <div class="loader"></div>
  </div><!-- Preloader end -->

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Left side: background image panel with logo, form, and mobile illustration -->
      <div class="login-left-panel">

        <!-- Logo -->
        <div class="login-logo-container">
          <img src="img/logo2.png?v=3" alt="IQA Logo" class="login-logo" />
        </div>

        <!-- Login Form -->
        <div class="login-form-container">
          <div class="login-form-header">
            <h5 class="login-title">Sign in</h5>
            <p class="login-subtitle">Enter your Details <a href="#" class="login-link">Sign in</a></p>
          </div>

          <form class="login-form">
            <!-- Email -->
            <div class="mb-4">
              <label class="form-label">Email</label>
              <div class="form-control-icon left" style="--form-control-icon: url(../img/input-user-icon.svg?v=3);">
                <input type="email" class="form-control" placeholder="username@gmail.com" required>
              </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
              <div class="d-flex align-items-center justify-content-between mb-1">
                <label class="form-label mb-0">Password</label>
                <a href="#" class="forgot-password-link">Forgot Password?</a>
              </div>
              <div class="form-control-icon left form-control-password" style="--form-control-icon: url(../img/input-lock-icon.svg?v=3);">
                <input type="password" class="form-control" placeholder="********************" required>
              </div>
            </div>

            <!-- Remember me -->
            <div class="mb-4 d-flex align-items-center">
              <div class="form-check p-0 d-flex align-items-center gap-2">
                <input type="checkbox" class="form-check-input m-0" id="rememberMeCheckbox">
                <label class="form-check-label" for="rememberMeCheckbox">Remember me</label>
              </div>
            </div>

            <!-- Submit Button -->
            <div class="text-center mt-5">
              <button type="submit" class="btn btn-login">Sign In</button>
            </div>
          </form>
        </div>

        <!-- Big Ben illustration: stacked on top of background on mobile (z-index 1, absolute bottom-right) -->
        <div class="login-mobile-illustration">
          <img src="img/bg-login-illustration.png?v=3" alt="Big Ben Illustration" />
        </div>

      </div><!-- /.login-left-panel -->

      <!-- Right side: Banner Image (Desktop only) -->
      <div class="login-right-panel d-none d-lg-flex">
        <img src="img/bg-login-illustration.png?v=3" alt="Big Ben Illustration" class="login-banner-img" />
      </div>

    </div><!-- /.login-card -->
  </div><!-- /.login-wrapper -->

  <!-- JS -->
  <script src="js/jquery-2.2.4.min.js"></script>
  <script src="js/moment.min.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/daterangepicker.js"></script>

  <!-- Custom JS -->
  <script src="js/main.js"></script>

</body>

</html>

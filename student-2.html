<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="css/bootstrap-icons.css">
  <link rel="stylesheet" href="css/daterangepicker.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/custom.css">

  <title>IQA</title>
</head>

<body>

  <!-- Preloader start -->
  <div class="preloader">
    <div class="loader"></div>
  </div><!-- Preloader end -->

  <div class="wrapper d-flex flex-column">

    <!--- Content start --->
    <div class="content-area">

      <div class="container-fluid h-100">
        <div class="row h-md-100">
          <div class="col-12 p-5 bg-img h-50" style="background-image: url(img/bg-img-02.jpg);">
            <img style="--max-md-width: 220px; --max-sm-width: 190px" src="img/logo.png" />
          </div>
          <div class="col-12 py-5 d-flex align-items-md-center justify-content-center">
            <div class="py-md-5" style="width: 100%;max-width: 410px;">
              <div class="mb-4 text-center">
                <h5 class="mb-1">Verify your Image</h5>
                <p>To Participate exam student need to verify their identity</p>
              </div>

              <form>

                <div class="my-5 text-center">
                  <img class="rounded-circle border border-2 border-primary mb-2" style="width: 258px;" src="img/avatar-icon.jpg" alt="">
                </div>

                <div class="mt-4">
                  <button type="submit" class="btn btn-primary btn-sm w-100">Verify</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

    </div><!--- Content end --->

  </div>

  <!-- JS -->
  <script src="js/jquery-2.2.4.min.js"></script>
  <script src="js/moment.min.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/daterangepicker.js"></script>

  <!-- Custom JS -->
  <script src="js/main.js"></script>

</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="css/bootstrap-icons.css">
  <link rel="stylesheet" href="css/daterangepicker.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/custom.css?v=6">

  <title>IQA - Verify your Image</title>
</head>

<body class="student-img-ver-page-body">

  <!-- Preloader start -->
  <div class="preloader">
    <div class="loader"></div>
  </div><!-- Preloader end -->

  <div class="student-img-ver-wrapper">
    <div class="student-img-ver-card">

      <!-- Left side: background image panel with logo, form, and mobile illustration -->
      <div class="student-img-ver-left-panel">

        <!-- Logo -->
        <div class="student-img-ver-logo-container">
          <img src="img/logo2.png?v=3" alt="IQA Logo" class="student-img-ver-logo" />
        </div>

        <!-- Verification Form -->
        <div class="student-img-ver-form-container">
          <div class="student-img-ver-form-header text-center">
            <h5 class="student-img-ver-title">Verify your Image</h5>
            <p class="student-img-ver-subtitle">To Participate exam student need to verify their identity</p>
          </div>

          <form class="student-img-ver-form">
            <!-- Image Preview Area -->
            <div class="student-img-ver-preview-container mb-4">
              <img src="img/student-face.png" alt="Student Verification Face" class="student-img-ver-preview" />
            </div>

            <!-- Submit Button -->
            <div class="text-center mt-3">
              <button type="submit" class="btn btn-student-img-ver">Verify</button>
            </div>
          </form>
        </div>

        <!-- Big Ben illustration: stacked on top of background on mobile -->
        <div class="student-img-ver-mobile-illustration">
          <img src="img/bg-login-illustration.png?v=3" alt="Big Ben Illustration" />
        </div>

      </div><!-- /.student-img-ver-left-panel -->

      <!-- Right side: Banner Image (Desktop only) -->
      <div class="student-img-ver-right-panel d-none d-lg-flex">
        <img src="img/bg-login-illustration.png?v=3" alt="Big Ben Illustration" class="student-img-ver-banner-img" />
      </div>

    </div><!-- /.student-img-ver-card -->
  </div><!-- /.student-img-ver-wrapper -->

  <!-- JS -->
  <script src="js/jquery-2.2.4.min.js"></script>
  <script src="js/moment.min.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/daterangepicker.js"></script>

  <!-- Custom JS -->
  <script src="js/main.js"></script>

</body>

</html>
